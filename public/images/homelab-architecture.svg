  </text>
  <text x="1074" y="686" fill="#D7E8FF" font-family="Manrope, Arial, sans-serif" font-size="17">
    and local file sharing
  </text>

  <path d="M1198 390V474H786" stroke="url(#accent)" stroke-width="4" stroke-linecap="round" stroke-linejoin="round" />
  <path d="M786 474L800 459V489L786 474Z" fill="#4EF4FF" />

  <rect x="1162" y="430" width="192" height="122" rx="24" fill="#151322" stroke="#FF7AA2" stroke-opacity="0.42" />
  <text x="1190" y="475" fill="#FF93B4" font-family="Space Grotesk, Arial, sans-serif" font-size="19" font-weight="700">
    Security Lab
  </text>
  <text x="1190" y="507" fill="#FFE1EA" font-family="Manrope, Arial, sans-serif" font-size="17">
