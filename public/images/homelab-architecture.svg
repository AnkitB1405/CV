  </text>

  <rect x="580" y="590" width="226" height="106" rx="22" fill="#0C1730" stroke="#68FFB4" stroke-opacity="0.32" />
  <text x="608" y="629" fill="#68FFB4" font-family="Space Grotesk, Arial, sans-serif" font-size="19" font-weight="700">
    Immich + PostgreSQL + Redis
  </text>
  <text x="608" y="661" fill="#D7E8FF" font-family="Manrope, Arial, sans-serif" font-size="17">
