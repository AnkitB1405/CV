  </text>

  <rect x="836" y="590" width="180" height="106" rx="22" fill="#0C1730" stroke="#4EF4FF" stroke-opacity="0.32" />
  <text x="864" y="629" fill="#4EF4FF" font-family="Space Grotesk, Arial, sans-serif" font-size="19" font-weight="700">
    Heimdall
  </text>
  <text x="864" y="661" fill="#D7E8FF" font-family="Manrope, Arial, sans-serif" font-size="17">
    Service dashboard
  </text>
  <text x="864" y="686" fill="#D7E8FF" font-family="Manrope, Arial, sans-serif" font-size="17">
    and navigation layer
  </text>

  <rect x="1046" y="590" width="202" height="106" rx="22" fill="#0C1730" stroke="#68FFB4" stroke-opacity="0.32" />
  <text x="1074" y="629" fill="#68FFB4" font-family="Space Grotesk, Arial, sans-serif" font-size="19" font-weight="700">
    Samba NAS
  </text>
  <text x="1074" y="661" fill="#D7E8FF" font-family="Manrope, Arial, sans-serif" font-size="17">
