  </text>

  <path d="M534 320H658" stroke="#4EF4FF" stroke-width="4" stroke-linecap="round" filter="url(#glow)" />
  <path d="M942 320H1068" stroke="#68FFB4" stroke-width="4" stroke-linecap="round" filter="url(#glow)" />
  <path d="M650 320L634 309V331L650 320Z" fill="#4EF4FF" />
  <path d="M1060 320L1044 309V331L1060 320Z" fill="#68FFB4" />

