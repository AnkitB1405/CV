  </text>

  <rect x="658" y="248" width="284" height="142" rx="28" fill="#0D1A2E" stroke="url(#accent)" stroke-opacity="0.9" />
  <rect x="684" y="276" width="232" height="20" rx="10" fill="#4EF4FF" fill-opacity="0.12" />
  <text x="703" y="291" fill="#4EF4FF" font-family="Space Grotesk, Arial, sans-serif" font-size="17" font-weight="700">
    Secure Access Layer
  </text>
  <text x="704" y="335" fill="#FFFFFF" font-family="Manrope, Arial, sans-serif" font-size="28" font-weight="700">
