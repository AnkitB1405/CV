<svg width="1600" height="900" viewBox="0 0 1600 900" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="220" y1="80" x2="1380" y2="820" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0B1226" />
      <stop offset="1" stop-color="#04070F" />
    </linearGradient>
    <linearGradient id="panel" x1="310" y1="160" x2="1270" y2="760" gradientUnits="userSpaceOnUse">
      <stop stop-color="#101B35" stop-opacity="0.95" />
      <stop offset="1" stop-color="#091224" stop-opacity="0.95" />
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#4EF4FF" />
      <stop offset="1" stop-color="#68FFB4" />
    </linearGradient>
    <filter id="glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="12" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <rect width="1600" height="900" rx="36" fill="url(#bg)" />
  <circle cx="250" cy="160" r="180" fill="#1B5BFF" fill-opacity="0.16" />
  <circle cx="1320" cy="170" r="170" fill="#3AE7C0" fill-opacity="0.13" />
  <circle cx="1320" cy="760" r="220" fill="#4EF4FF" fill-opacity="0.08" />

  <rect x="220" y="92" width="1160" height="716" rx="36" fill="url(#panel)" stroke="#FFFFFF" stroke-opacity="0.10" />
  <text x="280" y="162" fill="#FFFFFF" font-family="Manrope, Arial, sans-serif" font-size="34" font-weight="700">
    Homelab Infrastructure &amp; Self-Hosted Services
  </text>
  <text x="280" y="200" fill="#96A8C9" font-family="Manrope, Arial, sans-serif" font-size="18">
    Secure remote access, Docker Compose services, centralized storage, and an isolated cybersecurity practice environment
  </text>

  <rect x="278" y="258" width="256" height="122" rx="24" fill="#0B1427" stroke="#4EF4FF" stroke-opacity="0.45" />
  <text x="310" y="305" fill="#4EF4FF" font-family="Space Grotesk, Arial, sans-serif" font-size="20" font-weight="700">
    Trusted Devices
  </text>
  <text x="310" y="338" fill="#D7E8FF" font-family="Manrope, Arial, sans-serif" font-size="18">
    SSH, browser access,
  </text>
  <text x="310" y="364" fill="#D7E8FF" font-family="Manrope, Arial, sans-serif" font-size="18">
