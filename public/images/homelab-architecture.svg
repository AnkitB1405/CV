  </text>

  <rect x="352" y="590" width="198" height="106" rx="22" fill="#0C1730" stroke="#4EF4FF" stroke-opacity="0.32" />
  <text x="380" y="629" fill="#4EF4FF" font-family="Space Grotesk, Arial, sans-serif" font-size="19" font-weight="700">
