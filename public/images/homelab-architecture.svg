  </text>

  <rect x="1068" y="258" width="258" height="122" rx="24" fill="#0B1427" stroke="#68FFB4" stroke-opacity="0.45" />
  <text x="1100" y="305" fill="#68FFB4" font-family="Space Grotesk, Arial, sans-serif" font-size="20" font-weight="700">
    Linux / Proxmox Host
  </text>
  <text x="1100" y="338" fill="#D7E8FF" font-family="Manrope, Arial, sans-serif" font-size="18">
